name: Build Mac App

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-mac:
    name: Build macOS app
    runs-on: macos-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run dist:mac

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: The-25-Initiative-macOS
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error
